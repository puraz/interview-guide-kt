# 端口
server:
  port: 2528

# spring配置
spring:
  application:
    name: interview-guide-kt
  # 多环境配置
  profiles:
    active: dev
  # mvc
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # 数据源配置
  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:interview_guide}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:123456}
    # druid配置
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 30000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      test-while-idle: true
      test-on-borrow: true
      test-on-return: false
      remove-abandoned: true
      remove-abandoned-timeout: 1800
      pool-prepared-statements: false
      # max-pool-prepared-statement-per-connection-size: 20
      filters: stat, wall
      filter:
        wall:
          enabled: true # 启用 WallFilter // 用于 SQL 注入防护
          config:
            comment-allow: true # 允许 SQL 注释 // 兼容 ORM 生成的优化注释，避免被 Druid 误判为注入
      validation-query: SELECT 'x'
      aop-patterns: com.xwkj.*.*.service.*
      stat-view-servlet:
        url-pattern: /druid/*
        reset-enable: true
        login-username: admin
        login-password: admin
        enabled: true
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: none # 保持数据库结构由 SQL 管理
    open-in-view: false # 关闭 Open Session In View，避免懒加载穿透到 Controller
    show-sql: true # 输出 SQL 便于排查
    properties:
      hibernate:
        format_sql: true # SQL 格式化输出
  # 设置上传文件大小
  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB

